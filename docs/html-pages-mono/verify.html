<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>$ ctrls verify --totp</title>
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface-alt: #1c1c1c;
    --border: #2a2a2a; --text: #e8e8e8; --text-sub: #a0a0a0; --text-muted: #707070;
    --accent: #64c88c; --accent-hover: #7ad89e;
    --danger: #e56b6b; --success: #64c88c; --success-soft: rgba(100,200,140,.12);
    --font: "JetBrains Mono", "D2Coding", ui-monospace, "SF Mono", Menlo, monospace;
    --font-ui: "Inter", "Noto Sans KR", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: var(--font);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 16px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px; opacity: .4;
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .card {
    width: 100%; max-width: 420px; position: relative;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 36px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.02), 0 8px 40px rgba(0,0,0,.4);
  }
  @media (max-width: 480px) { .card { padding: 28px 20px; } }
  .dots { position: absolute; top: 10px; left: 12px; display: flex; gap: 6px; }
  .dots i {
    width: 8px; height: 8px; border-radius: 4px; opacity: .8; display: inline-block;
  }
  .dots i:nth-child(1) { background: #ff5f57; }
  .dots i:nth-child(2) { background: #febc2e; }
  .dots i:nth-child(3) { background: #28c840; }

  .header { margin-bottom: 24px; }
  .cmd {
    font-size: 11px; color: var(--accent); margin-bottom: 14px;
    display: flex; align-items: center; gap: 6px; letter-spacing: .5px;
  }
  .cmd-dot {
    width: 6px; height: 6px; border-radius: 3px; background: var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  @keyframes pop {
    0% { transform: scale(.7); opacity: 0; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 6px; letter-spacing: -.3px; }
  .subtitle { font-size: 12px; color: var(--text-sub); font-family: var(--font-ui); margin: 0; }
  .subtitle .slash { opacity: .5; }
  .subtitle code { font-family: var(--font); color: var(--accent); }

  .totp-label {
    font-size: 11px; color: var(--text-sub); margin-bottom: 10px; text-align: center;
  }
  .totp-label .caret { color: var(--accent); opacity: .7; }

  .otp { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
  .otp input {
    width: 46px; height: 50px; text-align: center;
    font-size: 18px; font-weight: 500; font-family: inherit;
    color: var(--text); background: var(--bg);
    border: 1px solid var(--border); border-radius: 2px;
    outline: none; padding: 0; min-width: 0;
    transition: border-color .12s, box-shadow .12s;
  }
  .otp input:focus {
    border-color: var(--accent); box-shadow: 0 0 0 2px rgba(100,200,140,.2);
  }
  @media (max-width: 480px) {
    .otp { gap: 5px; }
    .otp input { width: 38px; height: 44px; font-size: 16px; }
  }

  .err {
    font-size: 11px; color: var(--danger); text-align: center;
    margin: -8px 0 14px; display: none;
  }
  .err.show { display: block; }
  .err .tag { opacity: .7; }

  .btn {
    height: 40px; padding: 0 20px; width: 100%;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; transition: all .12s; letter-spacing: .3px; border-radius: 2px;
    border: 1px solid var(--accent); background: var(--accent); color: var(--bg);
  }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn:not(:disabled):hover { background: var(--accent-hover); }

  .resend {
    margin-top: 16px; text-align: center; font-size: 12px; color: var(--text-sub);
  }
  .resend .slash { opacity: .6; }
  a.link, button.link {
    color: var(--accent); text-decoration: none; background: none; border: none;
    cursor: pointer; font-family: inherit; font-size: inherit; padding: 0;
    letter-spacing: .2px;
  }
  a.link:hover, button.link:hover { text-decoration: underline; text-underline-offset: 3px; }
  a.link.muted { color: var(--text-sub); }
  a.link.muted:hover { color: var(--accent); }

  .back-row {
    margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
    text-align: center;
  }

  .verified { text-align: center; padding: 20px 0; display: none; }
  .verified.show { display: block; }
  .verified-icon {
    width: 50px; height: 50px; margin: 0 auto 14px;
    border: 1.5px solid var(--success); background: var(--success-soft);
    display: flex; align-items: center; justify-content: center;
    animation: pop .3s ease-out;
  }
  .verified-title {
    font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--success);
  }
  .verified-sub { font-size: 12px; color: var(--text-sub); }
  .verified-sub .slash { opacity: .6; }

  *:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }

  html[data-theme="light"] {
    --bg: #fafafa; --surface: #ffffff; --surface-alt: #f2f2f2;
    --border: #e5e5e5; --border-strong: #cfcfcf;
    --text: #111111; --text-sub: #555555; --text-muted: #888888;
    --accent: #2f8f5c; --accent-hover: #247047;
    --accent-soft: rgba(47,143,92,.1);
    --danger: #c64545; --danger-soft: rgba(198,69,69,.08);
    --success: #2f8f5c; --success-soft: rgba(47,143,92,.08);
  }
  html[data-theme="light"] body::before { opacity: .5; }
  html[data-theme="light"] .card {
    box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.04);
  }
  html[data-theme="light"] .verified-icon svg { stroke: #2f8f5c; }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-sub); cursor: pointer;
    font-family: var(--font); font-size: 11px;
    padding: 6px 10px; border-radius: 2px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .12s;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .theme-toggle .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
  }

</style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" type="button" aria-label="테마 전환">
    <span class="dot"></span><span id="themeLabel">dark</span>
  </button>
  <main class="card">
    <div class="dots"><i></i><i></i><i></i></div>
    <header class="header">
      <div class="cmd"><span class="cmd-dot"></span><span>$ ctrls verify --totp</span></div>
      <h1>2단계 인증</h1>
      <p class="subtitle"><span class="slash">// </span>인증 앱의 6자리 코드 (<code>123456</code>)</p>
    </header>

    <div id="main">
      <div class="totp-label"><span class="caret">&gt;</span> totp_code [6]</div>
      <div class="otp" id="otp">
        <input type="text" inputmode="numeric" maxlength="1" aria-label="OTP 1" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="OTP 2" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="OTP 3" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="OTP 4" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="OTP 5" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="OTP 6" />
      </div>
      <div id="err" class="err">
        <span class="tag">[error]</span> 코드가 일치하지 않습니다. 다시 시도해 주세요.
      </div>
      <button id="submit" type="button" class="btn" disabled>verify →</button>
      <div class="resend">
        <span class="slash">// </span>코드를 받지 못하셨나요?
        <button id="resend" class="link" type="button">resend</button>
      </div>
      <div class="back-row">
        <a class="link muted" href="login.html">← back to login</a>
      </div>
    </div>

    <div id="done" class="verified">
      <div class="verified-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#64c88c"
             stroke-width="2.5" stroke-linecap="round"><path d="M5 12l5 5L20 7"/></svg>
      </div>
      <div class="verified-title">[verified]</div>
      <div class="verified-sub"><span class="slash">// </span>authenticating session...</div>
    </div>
  </main>

<script>
(function () {
  var inputs = Array.from(document.querySelectorAll('#otp input'));
  var submit = document.getElementById('submit');
  var err = document.getElementById('err');

  function code() { return inputs.map(function (i) { return i.value; }).join(''); }
  function update() { submit.disabled = code().length !== 6; }

  inputs.forEach(function (inp, i) {
    inp.addEventListener('input', function () {
      if (inp.value && !/^\d$/.test(inp.value)) { inp.value = ''; update(); return; }
      err.classList.remove('show');
      if (inp.value && i < 5) inputs[i + 1].focus();
      update();
    });
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace') {
        if (!inp.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          update();
        }
      } else if (e.key === 'ArrowLeft' && i > 0) inputs[i - 1].focus();
      else if (e.key === 'ArrowRight' && i < 5) inputs[i + 1].focus();
    });
    inp.addEventListener('paste', function (ev) {
      var txt = (ev.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      if (!txt) return;
      ev.preventDefault();
      inputs.forEach(function (x, j) { x.value = txt[j] || ''; });
      inputs[Math.min(txt.length, 5)].focus();
      update();
    });
    inp.addEventListener('focus', function () { inp.select(); });
  });

  function verify() {
    if (code() === '123456') {
      document.getElementById('main').style.display = 'none';
      document.getElementById('done').classList.add('show');
      setTimeout(function () { location.href = 'login.html'; }, 1200);
    } else {
      err.classList.add('show');
      inputs.forEach(function (x) { x.value = ''; });
      inputs[0].focus();
      update();
    }
  }

  submit.addEventListener('click', verify);
  document.getElementById('resend').addEventListener('click', function () {
    err.classList.remove('show');
    alert('인증 코드가 다시 발송되었습니다.');
  });
  inputs[0].focus();
})();
</script>

  <script>
    (function () {
      var KEY = 'ctrls-theme';
      var saved = localStorage.getItem(KEY) || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('themeToggle');
        var label = document.getElementById('themeLabel');
        if (!btn) return;
        function sync() {
          var cur = document.documentElement.getAttribute('data-theme') || 'dark';
          label.textContent = cur;
        }
        sync();
        btn.addEventListener('click', function () {
          var cur = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = cur === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem(KEY, next);
          sync();
        });
      });
    })();
  </script>
</body>
</html>
