name: CI

on:
    pull_request:
        branches: [main]

jobs:
    format:
        name: Auto Format
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.ref }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run format
              run: bun run format

            - name: Commit and push formatted files
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  if [[ -z "$(git status --porcelain)" ]]; then
                    echo "No formatting changes"
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "chore: auto format"
                  git push

    check-changes:
        name: Check Changed Files
        runs-on: ubuntu-latest
        needs: format
        outputs:
            build-affected: ${{ steps.filter.outputs.build-affected }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Filter paths
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      build-affected:
                        - "src/**"
                        - "static/**"
                        - "package.json"
                        - "bun.lockb"
                        - "vite.config.*"
                        - "svelte.config.*"
                        - "tsconfig.json"
                        - "wrangler.toml"
                        - "wrangler.json"
                        - "drizzle.config.*"
                        - "eslint.config.*"
                        - ".prettierrc*"

    ci:
        name: Lint, Type Check & Build
        runs-on: ubuntu-latest
        needs: check-changes
        if: needs.check-changes.outputs.build-affected == 'true'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Type Check
              run: bun run check

            - name: Build
              run: bun run build

    required:
        name: CI Required
        runs-on: ubuntu-latest
        needs: [check-changes, ci]
        if: always()
        steps:
            - name: Check result
              run: |
                  if [[ "${{ needs.check-changes.outputs.build-affected }}" == "true" && "${{ needs.ci.result }}" != "success" ]]; then
                    echo "CI failed"
                    exit 1
                  fi
                  echo "CI passed or skipped"
