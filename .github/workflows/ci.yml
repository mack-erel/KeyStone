name: CI

on:
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    check-changes:
        name: Check Changed Files
        runs-on: ubuntu-latest
        outputs:
            build-affected: ${{ steps.filter.outputs.build-affected }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Filter paths
              uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      build-affected:
                        - "src/**"
                        - "static/**"
                        - "drizzle/**"
                        - "package.json"
                        - "bun.lock"
                        - "bunfig.toml"
                        - "vite.config.*"
                        - "svelte.config.*"
                        - "tsconfig.json"
                        - "wrangler.jsonc"
                        - "wrangler.example.jsonc"
                        - "drizzle.config.*"
                        - "eslint.config.*"
                        - ".prettierrc*"

    ci:
        name: Lint, Type Check & Build
        runs-on: ubuntu-latest
        needs: check-changes
        if: needs.check-changes.outputs.build-affected == 'true'

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Audit dependencies
              run: bun audit --audit-level=high

            - name: Setup Wrangler config
              run: cp wrangler.example.jsonc wrangler.jsonc

            - name: Generate Wrangler types
              run: bunx wrangler types

            - name: Lint
              run: bun run lint

            - name: Type Check
              run: bun run check

            - name: Build
              run: bun run build

    required:
        name: CI Required
        runs-on: ubuntu-latest
        needs: [check-changes, ci]
        if: always()
        steps:
            - name: Check result
              run: |
                  if [[ "${{ needs.check-changes.outputs.build-affected }}" == "true" && "${{ needs.ci.result }}" != "success" ]]; then
                    echo "CI failed"
                    exit 1
                  fi
                  echo "CI passed or skipped"
