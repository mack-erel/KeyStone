name: CI

on:
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    check-changes:
        name: Check Changed Files
        runs-on: ubuntu-latest
        outputs:
            build-affected: ${{ steps.filter.outputs.build-affected }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Filter paths
              uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      build-affected:
                        - "src/**"
                        - "static/**"
                        - "drizzle/**"
                        - "package.json"
                        - "bun.lock"
                        - "bunfig.toml"
                        - "vite.config.*"
                        - "svelte.config.*"
                        - "tsconfig.json"
                        - "wrangler.jsonc"
                        - "wrangler.example.jsonc"
                        - "drizzle.config.*"
                        - "eslint.config.*"
                        - ".prettierrc*"

    format:
        name: Auto Format
        runs-on: ubuntu-latest
        needs: check-changes
        if: needs.check-changes.outputs.build-affected == 'true'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}
                  # WORKFLOW_PAT 가 있으면 사용 — 자동 포맷 commit 이 새 workflow 를 트리거해야
                  # 후속 'Lint, Type Check & Build' / 'CI Required' 가 새 SHA 에서 다시 돌고
                  # branch protection 의 required check 가 충족됨. 미설정 시 GITHUB_TOKEN
                  # 으로 fallback (이 경우 새 commit 은 workflow 를 재트리거하지 않음).
                  token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run format
              run: bun run format

            - name: Commit formatted files
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: "style: 코드 자동 포맷 적용"

    ci:
        name: Lint, Type Check & Build
        runs-on: ubuntu-latest
        needs: [check-changes, format]
        if: needs.check-changes.outputs.build-affected == 'true' && (needs.format.result == 'success' || needs.format.result == 'skipped')

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Setup Wrangler config
              run: cp wrangler.example.jsonc wrangler.jsonc

            - name: Generate Wrangler types
              run: bunx wrangler types

            - name: Lint
              run: bun run lint

            - name: Type Check
              run: bun run check

            - name: Build
              run: bun run build

    required:
        name: CI Required
        runs-on: ubuntu-latest
        needs: [check-changes, ci]
        if: always()
        steps:
            - name: Check result
              run: |
                  if [[ "${{ needs.check-changes.outputs.build-affected }}" == "true" && "${{ needs.ci.result }}" != "success" ]]; then
                    echo "CI failed"
                    exit 1
                  fi
                  echo "CI passed or skipped"
