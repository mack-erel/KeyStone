name: Deploy

on:
    push:
        branches: [main]

jobs:
    check-changes:
        name: Check Changed Files
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            build-affected: ${{ steps.filter.outputs.build-affected }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Filter paths
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      build-affected:
                        - "src/**"
                        - "static/**"
                        - "package.json"
                        - "bun.lock"
                        - "vite.config.*"
                        - "svelte.config.*"
                        - "tsconfig.json"
                        - "wrangler.toml"
                        - "wrangler.json"
                        - "drizzle.config.*"
                        - "eslint.config.*"
                        - ".prettierrc*"

    deploy:
        name: Build & Deploy to Cloudflare Workers
        runs-on: ubuntu-latest
        needs: check-changes
        if: needs.check-changes.outputs.build-affected == 'true'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

            - name: Deploy
              run: bun run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
