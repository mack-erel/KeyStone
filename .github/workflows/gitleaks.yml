name: Secret Scan

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

concurrency:
    group: gitleaks-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    gitleaks:
        name: Gitleaks
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
